<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Quality Lab - Demo Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      color: #f9fafb;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #020617;
      color: #e5e7eb;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .response {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      background: #020617;
      border: 1px solid #334155;
      min-height: 80px;
    }

    .response strong {
      color: #38bdf8;
    }

    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>AI Quality Lab Demo Chatbot</h1>
    <p class="subtitle">
      A controlled demo interface for testing AI-style chatbot behaviour with Playwright.
    </p>

    <form id="chat-form">
      <label for="prompt-input">Prompt</label>
      <textarea
        id="prompt-input"
        data-testid="prompt-input"
        placeholder="Ask the AI assistant something..."
      ></textarea>

      <button type="submit" data-testid="send-button">Send</button>
    </form>

    <section class="response" data-testid="response-panel" aria-live="polite">
      <strong>Assistant response:</strong>
      <p id="response-text" data-testid="response-text">
        No response yet.
      </p>
      <p class="meta" data-testid="response-meta">
        Waiting for user input.
      </p>
    </section>
  </main>

  <script>
    const form = document.getElementById("chat-form");
    const promptInput = document.getElementById("prompt-input");
    const responseText = document.getElementById("response-text");
    const responseMeta = document.querySelector("[data-testid='response-meta']");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const prompt = promptInput.value.trim();

      if (!prompt) {
        responseText.textContent = "Please enter a prompt before sending.";
        responseMeta.textContent = "Validation message displayed.";
        return;
      }

      responseText.textContent =
        "This is a controlled AI-style response. The system has received the prompt and generated a testable answer.";

      responseMeta.textContent =
        "Response generated by deterministic demo logic for QA automation.";
    });
  </script>
</body>
</html>
